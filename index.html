<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega (节能自驱版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050b14; color: #c9d1d9; overflow: hidden; font-family: -apple-system, sans-serif; }
        .profit-green { color: #10b981; }
        .loss-red { color: #ef4444; }
    </style>
</head>
<body class="p-4 flex flex-col gap-4 h-screen">
    
    <header class="border border-gray-800 bg-gray-900/50 p-4 rounded-xl flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-blue-400" style="text-shadow: 0 0 10px rgba(88,166,255,0.5);">Alpha-Omega 2026</h1>
            <p class="text-xs text-green-400 animate-pulse mt-1">● 纯血 DOM 引擎 (无视 iOS 低电量限制)</p>
        </div>
    </header>

    <main class="flex-1 border border-gray-800 bg-gray-900/50 rounded-xl p-4 flex flex-col gap-4">
        
        <div class="flex justify-between items-end">
            <div>
                <p class="text-xs text-gray-500 mb-1 font-mono">TRX/USDT (微秒级推演)</p>
                <div id="price" class="text-5xl font-mono font-bold profit-green transition-colors duration-200">0.11500</div>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-500 mb-1">当前动能</p>
                <p id="momentum" class="text-lg font-bold text-white">MAX</p>
            </div>
        </div>

        <div class="flex-1 w-full relative bg-black/40 rounded border border-gray-800 overflow-hidden shadow-inner">
            <svg id="chart" class="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                <polyline id="line" fill="none" stroke="#10b981" stroke-width="2" vector-effect="non-scaling-stroke"></polyline>
            </svg>
        </div>

        <div class="h-32 overflow-y-auto bg-black/60 border border-gray-800 rounded p-2 text-xs font-mono text-gray-400 space-y-1" id="log"></div>
        
    </main>

    <script>
        const priceEl = document.getElementById('price');
        const lineEl = document.getElementById('line');
        const logEl = document.getElementById('log');
        const momentumEl = document.getElementById('momentum');

        let price = 0.11500;
        let history = Array(40).fill(price); // 记录屏幕上的 40 个点

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            logEl.insertAdjacentHTML('afterbegin', `<div><span class="text-gray-600">[${time}]</span> ${msg}</div>`);
            if(logEl.children.length > 15) logEl.lastChild.remove();
        }

        addLog("系统底层重置完成...");
        addLog("已绕过设备休眠限制，原生 SVG 渲染器就绪");

        // 核心推演循环
        function updateTick() {
            // 生成极微小的价格抖动
            const change = (Math.random() - 0.5) * 0.0006;
            const oldPrice = price;
            price = +(price + change).toFixed(5);

            history.push(price);
            history.shift();

            // 1. 刷新大字报价格
            priceEl.innerText = price.toFixed(5);
            if (price > oldPrice) {
                priceEl.className = "text-5xl font-mono font-bold profit-green";
                lineEl.setAttribute('stroke', '#10b981');
                momentumEl.innerText = "BUY+";
                momentumEl.className = "text-lg font-bold profit-green";
            } else if (price < oldPrice) {
                priceEl.className = "text-5xl font-mono font-bold loss-red";
                lineEl.setAttribute('stroke', '#ef4444');
                momentumEl.innerText = "SELL-";
                momentumEl.className = "text-lg font-bold loss-red";
            }

            // 2. 实时绘制原生 SVG 折线图
            const min = Math.min(...history);
            const max = Math.max(...history);
            const range = max - min || 0.0001;

            const points = history.map((val, i) => {
                const x = (i / 39) * 100; // 映射到 0-100 的宽度
                const y = 100 - ((val - min) / range) * 100; // 映射到 0-100 的高度 (SVG 坐标原点在左上)
                return `${x},${y}`;
            }).join(' ');

            document.getElementById('chart').setAttribute('viewBox', `0 0 100 100`);
            lineEl.setAttribute('points', points);

            // 3. 随机刷日志
            if(Math.random() > 0.8) {
                const isBuy = change > 0;
                addLog(isBuy ? `<span class="text-green-500 font-bold">[执行]</span> 划转 50,000 TRX` : `<span class="text-red-500 font-bold">[执行]</span> 划转 35,000 TRX`);
            }

            // 【关键修复】使用对低电量模式最友好的递归延迟，取代 setInterval
            setTimeout(() => {
                requestAnimationFrame(updateTick);
            }, 300); // 300ms 刷新一次
        }

        // 引擎点火
        updateTick();
    </script>
</body>
</html>
