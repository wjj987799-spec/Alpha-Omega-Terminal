<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega V4 防弹终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #050b14; color: #c9d1d9; font-family: -apple-system, sans-serif; }
        .glass-panel { background: rgba(13, 17, 23, 0.85); border: 1px solid #1f2937; border-radius: 12px; }
        .neon-text { text-shadow: 0 0 10px rgba(88, 166, 255, 0.6); }
        .profit-green { color: #10b981; }
        .loss-red { color: #ef4444; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col gap-4">

    <header class="glass-panel p-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl lg:text-2xl font-bold text-blue-400 neon-text">Alpha-Omega 防弹引擎</h1>
            <p id="statusText" class="text-xs text-gray-400 mt-1">系统状态: <span class="text-yellow-400 animate-pulse">● 正在探测网络节点...</span></p>
        </div>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="glass-panel p-4 flex justify-between items-center border-l-4 border-blue-500">
            <div>
                <div class="text-xs text-blue-400 font-mono mb-1">CRYPTO (TRON ECO)</div>
                <div class="font-bold text-lg">TRX / USDT</div>
            </div>
            <div class="text-right">
                <div id="ticker-crypto-price" class="text-2xl font-bold font-mono text-gray-400">--</div>
            </div>
        </div>
        <div class="glass-panel p-4 flex justify-between items-center border-l-4 border-purple-500">
            <div>
                <div class="text-xs text-purple-400 font-mono mb-1">US STOCKS (NASDAQ)</div>
                <div class="font-bold text-lg">特斯拉 (TSLA)</div>
            </div>
            <div class="text-right">
                <div id="ticker-us-price" class="text-2xl font-bold font-mono text-gray-400">--</div>
                <div id="ticker-us-pct" class="text-sm font-mono font-bold">--%</div>
            </div>
        </div>
        <div class="glass-panel p-4 flex justify-between items-center border-l-4 border-red-500">
            <div>
                <div class="text-xs text-red-400 font-mono mb-1">CHINA A-SHARES (SSE)</div>
                <div class="font-bold text-lg">上证指数 (000001)</div>
            </div>
            <div class="text-right">
                <div id="ticker-cn-price" class="text-2xl font-bold font-mono text-gray-400">--</div>
                <div id="ticker-cn-pct" class="text-sm font-mono font-bold">--%</div>
            </div>
        </div>
    </section>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="glass-panel col-span-1 lg:col-span-3 p-4 flex flex-col h-[400px] lg:h-auto">
            <h2 id="chartTitle" class="text-sm font-semibold mb-2 text-gray-300">TRX 实时高频盘口 (探测中)</h2>
            <div id="tvchart" class="flex-1 w-full h-full rounded overflow-hidden"></div>
        </div>

        <div class="glass-panel col-span-1 p-4 flex flex-col gap-4">
            <h2 class="text-sm font-semibold text-gray-300 border-b border-gray-700 pb-2">底层通讯日志</h2>
            <div id="signalLog" class="flex-1 bg-gray-900 rounded p-2 overflow-y-auto font-mono text-xs text-gray-400 space-y-1 h-48 lg:h-auto">
            </div>
        </div>
    </main>

    <script>
        function logMsg(msg, type = 'info') {
            const logBox = document.getElementById('signalLog');
            const time = new Date().toLocaleTimeString();
            let colorClass = 'text-gray-400';
            if (type === 'error') colorClass = 'text-red-400';
            if (type === 'success') colorClass = 'text-green-400';
            if (type === 'warn') colorClass = 'text-yellow-400';
            logBox.insertAdjacentHTML('afterbegin', `<div class="${colorClass}">[${time}] ${msg}</div>`);
        }

        // --- 传统股市数据拉取 (JSONP) ---
        function updateStockTicker(prefix, price, pct) {
            const priceEl = document.getElementById(prefix + '-price');
            const pctEl = document.getElementById(prefix + '-pct');
            const isUp = parseFloat(pct) >= 0;
            priceEl.innerText = price;
            pctEl.innerText = (isUp ? '+' : '') + pct + '%';
            priceEl.className = `text-2xl font-bold font-mono ${isUp ? 'profit-green' : 'loss-red'}`;
            pctEl.className = `text-sm font-mono font-bold ${isUp ? 'profit-green' : 'loss-red'}`;
        }

        function fetchGlobalStocks() {
            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=usTSLA,sh000001&r=${Math.random()}`;
            script.onload = () => {
                if (window.v_usTSLA) updateStockTicker('ticker-us', window.v_usTSLA.split('~')[3], window.v_usTSLA.split('~')[32]);
                if (window.v_sh000001) updateStockTicker('ticker-cn', window.v_sh000001.split('~')[3], window.v_sh000001.split('~')[32]);
                document.head.removeChild(script);
            };
            document.head.appendChild(script);
        }
        fetchGlobalStocks();
        setInterval(fetchGlobalStocks, 5000);
        logMsg("启动跨域流... A股/美股接口已桥接", "success");

        // --- K线图表初始化 ---
        const chartContainer = document.getElementById('tvchart');
        const chartOptions = { 
            layout: { textColor: '#c9d1d9', background: { type: 'solid', color: 'transparent' } },
            grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
            timeScale: { timeVisible: true, secondsVisible: true },
        };
        const chart = LightweightCharts.createChart(chartContainer, chartOptions);
        const candleSeries = chart.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false, wickUpColor: '#10b981', wickDownColor: '#ef4444' });

        new ResizeObserver(entries => {
            if (entries.length === 0 || entries[0].target !== chartContainer) return;
            const newRect = entries[0].contentRect;
            chart.applyOptions({ height: newRect.height, width: newRect.width });
        }).observe(chartContainer);

        // --- 核心容灾逻辑：带超时的 Fetch ---
        const fetchWithTimeout = (url, options, timeout = 3000) => {
            return Promise.race([
                fetch(url, options),
                new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), timeout))
            ]);
        };

        let currentTrxPrice = 0.1150; // 模拟初始价格

        function startFallbackSimulation() {
            logMsg("启动备用引擎：本地算力生成模拟盘口", "warn");
            document.getElementById('chartTitle').innerText = "TRX 本地模拟推演 (容灾模式)";
            document.getElementById('statusText').innerHTML = '系统状态: <span class="text-yellow-500 animate-pulse">● 离线模拟运行中</span>';
            
            // 生成初始假数据
            let time = Math.floor(Date.now() / 1000) - 3600;
            const mockData = [];
            for(let i=0; i<60; i++) {
                const open = currentTrxPrice;
                const close = open + (Math.random() - 0.5) * 0.0010;
                const high = Math.max(open, close) + Math.random() * 0.0005;
                const low = Math.min(open, close) - Math.random() * 0.0005;
                mockData.push({ time: time, open, high, low, close });
                currentTrxPrice = close;
                time += 60;
            }
            candleSeries.setData(mockData);

            // 每秒模拟跳动
            setInterval(() => {
                const lastCandle = mockData[mockData.length - 1];
                const newClose = lastCandle.close + (Math.random() - 0.5) * 0.0002;
                lastCandle.close = newClose;
                lastCandle.high = Math.max(lastCandle.high, newClose);
                lastCandle.low = Math.min(lastCandle.low, newClose);
                candleSeries.update(lastCandle);
                
                const priceEl = document.getElementById('ticker-crypto-price');
                priceEl.innerText = newClose.toFixed(5);
                priceEl.className = newClose >= lastCandle.open ? 'text-2xl font-bold font-mono profit-green' : 'text-2xl font-bold font-mono loss-red';
            }, 1000);
        }

        // 尝试连接币安，3秒连不上直接切本地模拟
        logMsg("探测 Binance 节点...");
        fetchWithTimeout('https://api.binance.com/api/v3/klines?symbol=TRXUSDT&interval=1m&limit=60', {}, 3000)
            .then(res => res.json())
            .then(data => {
                logMsg("Binance 节点直连成功！", "success");
                document.getElementById('chartTitle').innerText = "TRX 实时高频盘口 (Binance 节点)";
                document.getElementById('statusText').innerHTML = '系统状态: <span class="profit-green animate-pulse">● 全球节点实时同步</span>';
                const klines = data.map(d => ({
                    time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
                }));
                candleSeries.setData(klines);
                // 启动 WebSocket
                const ws = new WebSocket('wss://stream.binance.com:9443/ws/trxusdt@kline_1m');
                ws.onmessage = (event) => {
                    const kline = JSON.parse(event.data).k;
                    candleSeries.update({ time: kline.t / 1000, open: parseFloat(kline.o), high: parseFloat(kline.h), low: parseFloat(kline.l), close: parseFloat(kline.c) });
                    document.getElementById('ticker-crypto-price').innerText = parseFloat(kline.c).toFixed(4);
                };
            })
            .catch(err => {
                logMsg("Binance 节点被墙拦截，触发超时机制", "error");
                startFallbackSimulation();
            });

    </script>
</body>
</html>
