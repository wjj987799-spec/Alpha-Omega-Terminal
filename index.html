<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega 2026 超频版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #050b14; color: #c9d1d9; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(13, 17, 23, 0.85); border: 1px solid #1f2937; border-radius: 12px; }
        .neon-text { text-shadow: 0 0 15px rgba(88, 166, 255, 0.8); }
        .profit-green { color: #10b981; }
        .loss-red { color: #ef4444; }
        /* 添加平滑过渡动画 */
        .price-transition { transition: color 0.2s ease-in-out; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col gap-4">

    <header class="glass-panel p-4 flex justify-between items-center border-b-2 border-blue-500">
        <div>
            <h1 class="text-xl lg:text-3xl font-bold text-blue-400 neon-text tracking-wider">Alpha-Omega 2026</h1>
            <p class="text-xs text-gray-400 mt-1">引擎模式: <span class="profit-green font-bold animate-pulse">● 本地高频算力全开 (60FPS)</span></p>
        </div>
        <div class="text-right">
             <div class="text-xs text-gray-500 font-mono">LATENCY: <span class="text-green-400">0ms</span></div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-4">
        
        <div class="glass-panel col-span-1 lg:col-span-3 p-4 flex flex-col min-h-[450px]">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-sm font-semibold text-gray-300">TRX/USDT 高频推演盘口 (Tick级别)</h2>
                <div id="main-price" class="text-3xl font-bold font-mono profit-green price-transition">0.11500</div>
            </div>
            <div id="tvchart" class="flex-1 w-full h-[350px] lg:h-full rounded overflow-hidden relative"></div>
        </div>

        <div class="col-span-1 flex flex-col gap-4">
            
            <div class="glass-panel p-4">
                <h2 class="text-sm font-semibold text-gray-300 border-b border-gray-700 pb-2 mb-3">高频引擎状态</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-gray-800 p-3 rounded border border-gray-700 text-center">
                        <p class="text-xs text-gray-400">运算帧率</p>
                        <p class="text-xl font-bold text-blue-400">5.0 /s</p>
                    </div>
                    <div class="bg-gray-800 p-3 rounded border border-gray-700 text-center">
                        <p class="text-xs text-gray-400">模拟深度</p>
                        <p class="text-xl font-bold text-purple-400">L2</p>
                    </div>
                    <div class="bg-gray-800 p-3 rounded border border-gray-700 text-center">
                        <p class="text-xs text-gray-400">做多概率</p>
                        <p id="long-prob" class="text-xl font-bold profit-green">64%</p>
                    </div>
                    <div class="bg-gray-800 p-3 rounded border border-gray-700 text-center">
                        <p class="text-xs text-gray-400">波动微粒</p>
                        <p id="volatility" class="text-xl font-bold text-yellow-400">0.02</p>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-4 flex-1 flex flex-col">
                <h2 class="text-sm font-semibold text-gray-300 border-b border-gray-700 pb-2 mb-2">算力执行流</h2>
                <div id="signalLog" class="flex-1 bg-[#0d1117] rounded p-2 overflow-y-auto font-mono text-[10px] sm:text-xs text-gray-400 space-y-1 min-h-[150px] max-h-[200px]">
