<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega V8 三端引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050b14; color: #c9d1d9; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .profit-green { color: #10b981; }
        .loss-red { color: #ef4444; }
        .glass-panel { background: rgba(13, 17, 23, 0.7); border: 1px solid #1f2937; border-radius: 12px; }
        /* 隐藏滚动条但保持可滚动 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 flex flex-col gap-4 min-h-screen">
    
    <header class="glass-panel p-4 flex justify-between items-center border-b-2 border-blue-500">
        <div>
            <h1 class="text-xl font-bold text-blue-400" style="text-shadow: 0 0 10px rgba(88,166,255,0.5);">Alpha-Omega 2026</h1>
            <p class="text-xs text-green-400 animate-pulse mt-1">● 宏观阵列全开 (原生 SVG 渲染)</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col gap-4 overflow-y-auto pb-4">
        
        <div class="glass-panel p-3 flex flex-col gap-2 relative overflow-hidden border-l-4 border-blue-500">
            <div class="flex justify-between items-end z-10">
                <div>
                    <p class="text-xs text-blue-400 font-mono mb-1">CRYPTO | TRX/USDT</p>
                    <div id="price-trx" class="text-3xl font-mono font-bold profit-green transition-colors">0.11500</div>
                </div>
                <div class="text-right">
                    <p id="trend-trx" class="text-sm font-bold profit-green">BUY+</p>
                </div>
            </div>
            <div class="h-24 w-full bg-black/40 rounded border border-gray-800 shadow-inner relative z-10">
                <svg id="svg-trx" class="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                    <polyline id="line-trx" fill="none" stroke="#10b981" stroke-width="2" vector-effect="non-scaling-stroke"></polyline>
                </svg>
            </div>
        </div>

        <div class="glass-panel p-3 flex flex-col gap-2 relative overflow-hidden border-l-4 border-purple-500">
            <div class="flex justify-between items-end z-10">
                <div>
                    <p class="text-xs text-purple-400 font-mono mb-1">NASDAQ | TESLA (TSLA)</p>
                    <div id="price-tsla" class="text-3xl font-mono font-bold profit-green transition-colors">405.05</div>
                </div>
                <div class="text-right">
                    <p id="trend-tsla" class="text-sm font-bold profit-green">BUY+</p>
                </div>
            </div>
            <div class="h-24 w-full bg-black/40 rounded border border-gray-800 shadow-inner relative z-10">
                <svg id="svg-tsla" class="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                    <polyline id="line-tsla" fill="none" stroke="#10b981" stroke-width="2" vector-effect="non-scaling-stroke"></polyline>
                </svg>
            </div>
        </div>

        <div class="glass-panel p-3 flex flex-col gap-2 relative overflow-hidden border-l-4 border-red-500">
            <div class="flex justify-between items-end z-10">
                <div>
                    <p class="text-xs text-red-400 font-mono mb-1">SSE | 上证指数 (000001)</p>
                    <div id="price-sse" class="text-3xl font-mono font-bold loss-red transition-colors">4106.25</div>
                </div>
                <div class="text-right">
                    <p id="trend-sse" class="text-sm font-bold loss-red">SELL-</p>
                </div>
            </div>
            <div class="h-24 w-full bg-black/40 rounded border border-gray-800 shadow-inner relative z-10">
                <svg id="svg-sse" class="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                    <polyline id="line-sse" fill="none" stroke="#ef4444" stroke-width="2" vector-effect="non-scaling-stroke"></polyline>
                </svg>
            </div>
        </div>

        <div class="h-24 overflow-y-auto bg-black/60 border border-gray-800 rounded-xl p-2 text-[10px] font-mono text-gray-400 space-y-1" id="log"></div>

    </main>

    <script>
        // 资产配置中心
        const assets = {
            trx:  { price: 0.11500, vol: 0.0006, dec: 5, history: Array(40).fill(0.11500) },
            tsla: { price: 405.05,  vol: 0.8,    dec: 2, history: Array(40).fill(405.05) },
            sse:  { price: 4106.25, vol: 4.5,    dec: 2, history: Array(40).fill(4106.25) }
        };

        const logEl = document.getElementById('log');

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            logEl.insertAdjacentHTML('afterbegin', `<div><span class="text-gray-600">[${time}]</span> ${msg}</div>`);
            if(logEl.children.length > 8) logEl.lastChild.remove();
        }

        addLog("正在初始化三端宏观阵列...");
        addLog("纯 DOM/SVG 引擎已接管渲染权限");

        // 核心推演循环 (处理所有资产)
        function updateTick() {
            Object.keys(assets).forEach(key => {
                const asset = assets[key];
                
                // 1. 生成抖动
                const change = (Math.random() - 0.5) * asset.vol;
                const oldPrice = asset.price;
                asset.price = +(asset.price + change).toFixed(asset.dec);

                asset.history.push(asset.price);
                asset.history.shift();

                // 2. 更新 DOM 节点
                const priceEl = document.getElementById(`price-${key}`);
                const trendEl = document.getElementById(`trend-${key}`);
                const lineEl = document.getElementById(`line-${key}`);
                
                const isUp = asset.price >= oldPrice;
                const colorClass = isUp ? "profit-green" : "loss-red";
                const hexColor = isUp ? "#10b981" : "#ef4444";

                priceEl.innerText = asset.price.toFixed(asset.dec);
                priceEl.className = `text-3xl font-mono font-bold transition-colors ${colorClass}`;
                
                trendEl.innerText = isUp ? "BUY+" : "SELL-";
                trendEl.className = `text-sm font-bold ${colorClass}`;
                lineEl.setAttribute('stroke', hexColor);

                // 3. 绘制专属 SVG
                const min = Math.min(...asset.history);
                const max = Math.max(...asset.history);
                const range = max - min || 0.0001;

                const points = asset.history.map((val, i) => {
                    const x = (i / 39) * 100; 
                    const y = 100 - ((val - min) / range) * 100; 
                    return `${x},${y}`;
                }).join(' ');

                document.getElementById(`svg-${key}`).setAttribute('viewBox', `0 0 100 100`);
                lineEl.setAttribute('points', points);
            });

            // 随机刷日志制造科技感
            if(Math.random() > 0.8) {
                const logs = [
                    `<span class="text-blue-500 font-bold">[TRX]</span> 监测到大额钱包异动`,
                    `<span class="text-purple-500 font-bold">[TSLA]</span> 触发做市商高频量化网格`,
                    `<span class="text-red-500 font-bold">[SSE]</span> 北向资金流入模型触发`
                ];
                addLog(logs[Math.floor(Math.random() * logs.length)]);
            }

            // 防休眠循环调度
            setTimeout(() => {
                requestAnimationFrame(updateTick);
            }, 300);
        }

        // 引擎点火
        updateTick();
    </script>
</body>
</html>
