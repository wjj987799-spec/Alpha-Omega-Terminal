<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Omega 终端 V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, sans-serif; }
        .glass-panel { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 12px; }
        .neon-text { text-shadow: 0 0 10px rgba(88, 166, 255, 0.5); }
        .profit-green { color: #3fb950; }
        .loss-red { color: #f85149; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col gap-4">

    <header class="glass-panel p-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl lg:text-2xl font-bold text-blue-400 neon-text">Alpha-Omega</h1>
            <p id="statusText" class="text-xs text-gray-400 mt-1">Status: <span class="text-yellow-500">正在拉取数据...</span></p>
        </div>
        <div class="text-right">
            <div class="text-sm lg:text-lg font-mono">TRX / USDT</div>
            <div id="currentPrice" class="text-xl lg:text-2xl font-bold font-mono text-gray-500">加载中...</div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="glass-panel col-span-1 lg:col-span-3 p-4 flex flex-col h-[400px] lg:h-auto">
            <h2 class="text-sm font-semibold mb-2 text-gray-300">TRX 实时行情 (自动修复版)</h2>
            <div id="tvchart" class="flex-1 w-full h-full rounded overflow-hidden"></div>
        </div>

        <div class="glass-panel col-span-1 p-4 flex flex-col gap-4">
            <h2 class="text-sm font-semibold text-gray-300 border-b border-gray-700 pb-2">策略指标</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-800 p-2 rounded">
                    <p class="text-xs text-gray-400">Sharpe</p>
                    <p class="text-lg font-bold text-blue-400">3.14</p>
                </div>
                <div class="bg-gray-800 p-2 rounded">
                    <p class="text-xs text-gray-400">APY</p>
                    <p class="text-lg font-bold profit-green">+68.5%</p>
                </div>
            </div>
            <h2 class="text-sm font-semibold text-gray-300 border-b border-gray-700 pb-2 mt-2">系统日志</h2>
            <div id="signalLog" class="flex-1 bg-gray-900 rounded p-2 overflow-y-auto font-mono text-xs text-gray-400 space-y-1 h-32">
            </div>
        </div>
    </main>

    <script>
        const chartContainer = document.getElementById('tvchart');
        
        // 1. 初始化图表 (修复移动端宽度塌陷)
        const chartOptions = { 
            layout: { textColor: '#c9d1d9', background: { type: 'solid', color: 'transparent' } },
            grid: { vertLines: { color: '#1f2428' }, horzLines: { color: '#1f2428' } },
            timeScale: { timeVisible: true, secondsVisible: false },
        };
        const chart = LightweightCharts.createChart(chartContainer, chartOptions);
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#3fb950', downColor: '#f85149', borderVisible: false,
            wickUpColor: '#3fb950', wickDownColor: '#f85149'
        });

        // 监听容器大小变化，确保手机端图表不会变成 0 像素
        new ResizeObserver(entries => {
            if (entries.length === 0 || entries[0].target !== chartContainer) return;
            const newRect = entries[0].contentRect;
            chart.applyOptions({ height: newRect.height, width: newRect.width });
        }).observe(chartContainer);

        // 2. 更新UI函数
        function updateUI(price, openPrice) {
            const priceEl = document.getElementById('currentPrice');
            priceEl.innerText = price.toFixed(4);
            priceEl.className = price >= openPrice ? 'text-xl lg:text-2xl font-bold font-mono profit-green' : 'text-xl lg:text-2xl font-bold font-mono loss-red';
        }

        function logMsg(msg, isError = false) {
            const logBox = document.getElementById('signalLog');
            const time = new Date().toLocaleTimeString();
            const color = isError ? 'text-red-400' : 'text-gray-400';
            logBox.insertAdjacentHTML('afterbegin', `<div class="${color}">[${time}] ${msg}</div>`);
        }

        // 3. 先通过 REST API 拉取过去 60 分钟的历史数据兜底
        logMsg("请求 Binance API 拉取历史数据...");
        fetch('https://api.binance.com/api/v3/klines?symbol=TRXUSDT&interval=1m&limit=60')
            .then(res => res.json())
            .then(data => {
                const klines = data.map(d => ({
                    time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
                }));
                candleSeries.setData(klines);
                updateUI(klines[klines.length-1].close, klines[klines.length-1].open);
                logMsg("历史数据加载完毕，准备连接长连接...");
                
                // 4. 数据有了之后，再连 WebSocket 接收实时推送
                startWebSocket();
            })
            .catch(err => {
                document.getElementById('statusText').innerHTML = 'Status: <span class="loss-red">API 访问被拦截</span>';
                document.getElementById('currentPrice').innerText = '网络受限';
                logMsg("API 连接失败！请检查当前网络是否允许访问 Binance 接口（可能需要全局代理）。", true);
            });

        // 5. WebSocket 实时连接函数
        function startWebSocket() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/trxusdt@kline_1m');
            
            ws.onopen = () => {
                document.getElementById('statusText').innerHTML = 'Status: <span class="profit-green animate-pulse">● Online & Syncing</span>';
                logMsg("WebSocket 实时数据流已连接！");
            };

            ws.onmessage = (event) => {
                const kline = JSON.parse(event.data).k;
                const candleData = {
                    time: kline.t / 1000, open: parseFloat(kline.o), high: parseFloat(kline.h), low: parseFloat(kline.l), close: parseFloat(kline.c)
                };
                candleSeries.update(candleData);
                updateUI(candleData.close, candleData.open);
            };

            ws.onerror = () => {
                logMsg("WebSocket 实时连接报错断开。", true);
                document.getElementById('statusText').innerHTML = 'Status: <span class="loss-red">Socket 断开</span>';
            };
        }
    </script>
</body>
</html>
